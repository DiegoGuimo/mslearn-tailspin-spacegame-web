trigger:
- '*'

pool:
  name: 'RetoAzure'  # Nombre del pool donde está MyAgent
  demands:
    - agent.name -equals MyAgent

variables:
  buildConfiguration: 'Release'
  wwwrootDir: 'Tailspin.SpaceGame.Web/wwwroot'
  dotnetSdkVersion: '8.x'

steps:
- task: UseDotNet@2
  displayName: 'Use .NET SDK $(dotnetSdkVersion)'
  inputs:
    version: '$(dotnetSdkVersion)'

- task: UseNode@1
  displayName: 'Install Node.js 16.x'
  inputs:
    version: '16.x'

- script: 'npm cache clean --force'
  displayName: 'Clean NPM cache'

- script: 'if exist node_modules rmdir /s /q node_modules'
  displayName: 'Delete node_modules directory'
  condition: succeededOrFailed()

- task: Npm@1
  displayName: 'Run npm install'
  inputs:
    verbose: false
    arguments: '--no-optional'
    
- script: 'npx sass $(wwwrootDir) --no-source-map --style=compressed'
  displayName: 'Compile Sass assets'

- script: 'npm install --global gulp-cli'
  displayName: 'Install Gulp CLI globally'

- task: gulp@1
  displayName: 'Run gulp tasks'

- script: 'echo "$(Build.DefinitionName), $(Build.BuildId), $(Build.BuildNumber)" > buildinfo.txt'
  displayName: 'Write build info'
  workingDirectory: $(wwwrootDir)

- task: DotNetCoreCLI@2
  displayName: 'Restore project dependencies'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Build the project - $(buildConfiguration)'
  inputs:
    command: 'build'
    arguments: '--no-restore --configuration $(buildConfiguration)'
    projects: '**/*.csproj'

- task: DotNetCoreCLI@2
  displayName: 'Install .NET tools from local manifest'
  inputs:
    command: custom
    custom: tool
    arguments: 'restore'

- task: DotNetCoreCLI@2
  displayName: 'Run unit tests with coverage - $(buildConfiguration)'
  inputs:
    command: 'test'
    arguments: '--no-build --configuration $(buildConfiguration) --collect:"XPlat Code Coverage"'
    publishTestResults: true
    projects: '**/*.Tests.csproj'

# 🛠️ LISTAR ARCHIVOS PARA VERIFICAR DONDE SE GENERA LA COBERTURA
- task: CmdLine@2
  displayName: 'List files in TestResults directory'
  inputs:
    script: 'dir /s /b $(Build.SourcesDirectory)\Tailspin.SpaceGame.Web.Tests\TestResults'

# ✅ CONVERTIR COBERTURA A FORMATO COBERTURA.XML
- task: CmdLine@2
  displayName: 'Convert .coverage to cobertura.xml'
  inputs:
    script: |
      reportgenerator -reports:$(Build.SourcesDirectory)/Tailspin.SpaceGame.Web.Tests/TestResults/**/*.coverage -targetdir:$(Build.SourcesDirectory)/CodeCoverage -reporttypes:Cobertura
  condition: succeededOrFailed()

# ✅ GENERAR REPORTE DE COBERTURA SOLO SI EL ARCHIVO EXISTE
- task: DotNetCoreCLI@2
  displayName: 'Create code coverage report'
  inputs:
    command: custom
    custom: tool
    arguments: 'run reportgenerator -reports:$(Build.SourcesDirectory)/CodeCoverage/coverage.cobertura.xml -targetdir:$(Build.SourcesDirectory)/CodeCoverage -reporttypes:HtmlInline_AzurePipelines'
  condition: succeededOrFailed()

# ✅ PUBLICAR REPORTE DE COBERTURA CON RUTA CORRECTA
- task: PublishCodeCoverageResults@1
  displayName: 'Publish code coverage report'
  inputs:
    codeCoverageTool: 'cobertura'
    summaryFileLocation: '$(Build.SourcesDirectory)/CodeCoverage/coverage.cobertura.xml'
  condition: succeededOrFailed()

- task: DotNetCoreCLI@2
  displayName: 'Publish the project - $(buildConfiguration)'
  inputs:
    command: 'publish'
    projects: '**/*.csproj'
    publishWebProjects: false
    arguments: '--no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/$(buildConfiguration)'
    zipAfterPublish: true

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  condition: succeeded()